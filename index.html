<script>
    async function resizeImage() {
        const file = document.getElementById('resizeInput').files[0];
        const targetKB = document.getElementById('targetSize').value;
        if (!file || !targetKB) return alert("फोटो और KB चुनें!");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `PrexGuru_Resized.jpg`;
                link.click();
            };
        };
    }

    async function convertToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const files = document.getElementById('pdfInput').files;
        if (files.length === 0) return alert("फोटो चुनें!");
        for (let i = 0; i < files.length; i++) {
            const imgData = await new Promise(res => {
                const reader = new FileReader();
                reader.onload = (e) => res(e.target.result);
                reader.readAsDataURL(files[i]);
            });
            if (i > 0) doc.addPage();
            doc.addImage(imgData, 'JPEG', 10, 10, 190, 150);
        }
        doc.save("PrexGuru_Doc.pdf");
    }

    function shareWebsite() {
        if (navigator.share) {
            navigator.share({
                title: 'Prex Guru VIP Tools',
                text: 'भाई, फोटो रिसाइज और PDF बनाने के लिए ये बढ़िया है!',
                url: window.location.href
            });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("लिंक कॉपी हो गया!");
        }
    }// विज़िटर काउंटर लॉजिक (यह आपके ब्राउज़र की मेमोरी में सेव होगा)
let visits = localStorage.getItem('visitorCount');
if (visits === null) {
    visits = 1;
} else {
    visits = parseInt(visits) + 1;
}
localStorage.setItem('visitorCount', visits);
document.getElementById('count').innerText = visits;
async function resizeImage() {
    const file = document.getElementById('resizeInput').files[0];
    const targetKB = parseInt(document.getElementById('targetSize').value);
    
    if (!file || !targetKB) return alert("फोटो और टारगेट KB चुनें!");

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // फोटो के पिक्सल थोड़े कम करना ताकि साइज जल्दी घटे
            let width = img.width;
            let height = img.height;
            if (width > 1200) { 
                const ratio = 1200 / width;
                width = 1200;
                height = height * ratio;
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            let quality = 0.9;
            let dataUrl = canvas.toDataURL('image/jpeg', quality);
            let sizeInKB = Math.round((dataUrl.split(',')[1].length * 3) / 4 / 1024);

            // जब तक साइज टारगेट से बड़ा है, क्वालिटी कम करते रहो
            while (sizeInKB > targetKB && quality > 0.1) {
                quality -= 0.05;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
                sizeInKB = Math.round((dataUrl.split(',')[1].length * 3) / 4 / 1024);
            }

            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = `PrexGuru_${targetKB}KB.jpg`;
            link.click();
            
            alert("सफलता! फोटो लगभग " + sizeInKB + " KB में तैयार है।");
        };
    };
}

</script>
